name: Notify if Free Court

on:
  workflow_dispatch:
    inputs:
      start_date_offset:
        description: "Days from today for scan start date"
        required: false
        type: string
      end_date_offset:
        description: "Days from today for scan end date"
        required: false
        type: string
      start_hour:
        description: "Start hour (0-23)"
        required: false
        type: string
      end_hour:
        description: "End hour (1-24)"
        required: false
        type: string
      skip_weekend:
        description: "Skip weekend days (true/false)"
        required: false
        type: string
      skip_weekdays:
        description: "Comma-separated day numbers to skip (0=Sun..6=Sat)"
        required: false
        type: string
      specific_dates:
        description: "Comma-separated dates DD/MM/YYYY (mutually exclusive with offsets/skip)"
        required: false
        type: string
      min_playtime_hours:
        description: "Minimum playtime in hours (e.g. 1, 1.5, 2)"
        required: false
        type: string
      telegram_chat_id:
        description: "Telegram chat/group ID to send notifications to (overrides secret)"
        required: false
        type: string
      clubs:
        description: "JSON array of club configs (overrides secret)"
        required: false
        type: string

concurrency:
  group: court-check
  cancel-in-progress: false

jobs:
  check-court:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Restore slot_history.xlsx from cache
        uses: actions/cache/restore@v4
        with:
          path: data/slot_history_${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}.xlsx
          key: court-slot-history-${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}-${{ github.run_id }}
          restore-keys: court-slot-history-${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}-

      - name: Install dependencies
        run: npm install

      - name: Print slot_history.xlsx content if it exists
        run: |
          CHAT_ID="${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}"
          FILE="data/slot_history_${CHAT_ID}.xlsx"
          if [ -f "$FILE" ]; then
            echo "✅ $FILE found. Printing contents:"
            node -e "
              const XLSX = require('xlsx');
              const wb = XLSX.readFile('$FILE');
              const ws = wb.Sheets[wb.SheetNames[0]];
              console.log(JSON.stringify(XLSX.utils.sheet_to_json(ws, { header: 1 }), null, 2));
            "
          else
            echo "❌ $FILE not found."
          fi

      - name: Run court availability check
        env:
          CLUBS: ${{ inputs.clubs || secrets.CLUBS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}
          COOKIE: ${{ secrets.COOKIE }}
          MATCHPOINTER_API_KEY: ${{ secrets.MATCHPOINTER_API_KEY }}
          SCAN_START_DATE_OFFSET: ${{ inputs.start_date_offset }}
          SCAN_END_DATE_OFFSET: ${{ inputs.end_date_offset }}
          SCAN_START_HOUR: ${{ inputs.start_hour }}
          SCAN_END_HOUR: ${{ inputs.end_hour }}
          SCAN_SKIP_WEEKEND: ${{ inputs.skip_weekend }}
          SCAN_SKIP_WEEKDAYS: ${{ inputs.skip_weekdays }}
          SCAN_SPECIFIC_DATES: ${{ inputs.specific_dates }}
          SCAN_MIN_PLAYTIME_HOURS: ${{ inputs.min_playtime_hours }}
        run: npx tsx src/jobs/findAvailableSlots.job.ts

      - name: Save updated slot_history.xlsx to cache
        uses: actions/cache/save@v4
        with:
          path: data/slot_history_${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}.xlsx
          key: court-slot-history-${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}-${{ github.run_id }}

      - name: Upload slot_history.xlsx as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slot_history-${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}-${{ github.run_id }}
          path: data/slot_history_${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}.xlsx

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ Court scanner workflow failed%0A%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
