name: Notify if Free Court

on:
  workflow_dispatch:
    inputs:
      start_date_offset:
        description: "Days from today for scan start date"
        required: false
        type: string
      end_date_offset:
        description: "Days from today for scan end date"
        required: false
        type: string
      start_hour:
        description: "Start hour (0-23)"
        required: false
        type: string
      end_hour:
        description: "End hour (1-24)"
        required: false
        type: string
      skip_weekend:
        description: "Skip weekend days (true/false)"
        required: false
        type: string
      skip_weekdays:
        description: "Comma-separated day numbers to skip (0=Sun..6=Sat)"
        required: false
        type: string

jobs:
  check-court:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Restore slot_history.xlsx from cache
        id: restore-cache
        uses: actions/cache@v3
        with:
          path: data/slot_history.xlsx
          key: court-cache-${{ github.run_id }}
          restore-keys: court-cache-

      - name: Install dependencies
        run: npm install

      - name: Print slot_history.xlsx content if it exists
        run: |
          if [ -f data/slot_history.xlsx ]; then
            echo "✅ slot_history.xlsx found. Printing contents:"
            node -e "
              const XLSX = require('xlsx');
              const wb = XLSX.readFile('data/slot_history.xlsx');
              const ws = wb.Sheets[wb.SheetNames[0]];
              console.log(JSON.stringify(XLSX.utils.sheet_to_json(ws, { header: 1 }), null, 2));
            "
          else
            echo '❌ slot_history.xlsx not found.'
          fi

      - name: Run court availability check
        env:
          EMAIL: ${{ secrets.EMAIL }}
          URL: ${{ secrets.URL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          TWILIO_SANDBOX_NUMBER: ${{ secrets.TWILIO_SANDBOX_NUMBER }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          COOKIE: ${{ secrets.COOKIE }}
          SCAN_START_DATE_OFFSET: ${{ inputs.start_date_offset }}
          SCAN_END_DATE_OFFSET: ${{ inputs.end_date_offset }}
          SCAN_START_HOUR: ${{ inputs.start_hour }}
          SCAN_END_HOUR: ${{ inputs.end_hour }}
          SCAN_SKIP_WEEKEND: ${{ inputs.skip_weekend }}
          SCAN_SKIP_WEEKDAYS: ${{ inputs.skip_weekdays }}
        run: npx ts-node -r tsconfig-paths/register src/jobs/findAvailableSlots.job.ts

      - name: Save updated slot_history.xlsx to cache
        uses: actions/cache@v3
        with:
          path: data/slot_history.xlsx
          key: court-cache-${{ github.run_id }}

      - name: Upload slot_history.xlsx as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slot_history
          path: data/slot_history.xlsx
